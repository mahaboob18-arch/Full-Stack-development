<!DOCTYPE html>
<html >
<head>
<title>JavaScript Event Playground</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.container {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    width: 400px;
    text-align: center;
    color: white;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
    animation: fadeIn 1s ease-in-out;
}

h1 {
    margin-bottom: 25px;
    font-size: 22px;
    letter-spacing: 1px;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #ff4b2b;
}

.hoverBox {
    margin: 20px 0;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.15);
    transition: 0.3s ease;
}

.hoverBox:hover {
    background: #00c6ff;
    color: black;
    transform: scale(1.05);
}

input {
    padding: 10px;
    width: 100%;
    border-radius: 20px;
    border: none;
    margin-top: 15px;
    text-align: center;
    outline: none;
}

p {
    margin-top: 10px;
    font-size: 14px;
    min-height: 20px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h1> JavaScript Event Playground</h1>

    <button id="clickBtn">Click Me</button>
    <p id="clickText"></p>

    <div class="hoverBox">Hover Over Me</div>

    <input type="text" id="keyInput" placeholder="Type something...">
    <p id="keyOutput"></p>

    <form id="form">
        <input type="text" id="nameInput" placeholder="Enter your name" required>
        <button type="submit">Submit</button>
    </form>
    <p id="formMessage"></p>
</div>

<script>
document.getElementById("clickBtn").addEventListener("click", function() {
    document.getElementById("clickText").innerText = " Button Clicked Successfully!";
});

document.getElementById("keyInput").addEventListener("keyup", function(event) {
    document.getElementById("keyOutput").innerText = 
        "You typed: " + event.target.value;
});

document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();
    const name = document.getElementById("nameInput").value;
    document.getElementById("formMessage").innerText =
        " Welcome, " + name + "!";
});
</script>

</body>
</html>
