<!DOCTYPE html>
<html>
<head>
    <title>Modern Form Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            width: 380px;
            padding: 35px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            color: white;
        }

        .container h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }

        .input-group input:focus {
            box-shadow: 0 0 8px #fff;
        }

        .input-group span {
            position: absolute;
            right: 12px;
            top: 12px;
            font-size: 18px;
        }

        .error {
            font-size: 13px;
            color: #ffdddd;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: #764ba2;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ddd;
            transform: scale(1.05);
        }

        .success {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #00ffcc;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>
    <form id="myForm">

        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
            <span>👤</span>
            <div id="userError" class="error"></div>
        </div>

        <div class="input-group">
            <input type="text" id="email" placeholder="Email">
            <span>📧</span>
            <div id="emailError" class="error"></div>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
            <span>🔒</span>
            <div id="passError" class="error"></div>
        </div>

        <button type="submit">Register</button>
        <div id="successMsg" class="success"></div>

    </form>
</div>

<script>
document.getElementById("myForm").addEventListener("submit", function(event) {

    event.preventDefault();

    let username = document.getElementById("username").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    document.getElementById("userError").innerHTML = "";
    document.getElementById("emailError").innerHTML = "";
    document.getElementById("passError").innerHTML = "";
    document.getElementById("successMsg").innerHTML = "";

    let valid = true;

    if (username === "") {
        document.getElementById("userError").innerHTML = "Username cannot be empty";
        valid = false;
    }

    if (!email.match(emailPattern)) {
        document.getElementById("emailError").innerHTML = "Enter valid email format";
        valid = false;
    }

    if (password.length < 6) {
        document.getElementById("passError").innerHTML = "Minimum 6 characters required";
        valid = false;
    }

    if (valid) {
        document.getElementById("successMsg").innerHTML = "✔ Registration Successful!";
    }

});
</script>

</body>
</html>
